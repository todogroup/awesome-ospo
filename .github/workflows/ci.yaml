name: CI
on:
  push:
    branches:
      - main
  pull_request:

# Declare default permissions as read-only
permissions: read-all

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - run: npx awesome-lint
